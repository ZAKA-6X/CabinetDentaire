<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<title>Clinique Dentaire · Portail Patient</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500;9..144,600&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f4f1ea;
  --surface:#fbf8f2;
  --card:#ffffff;
  --ink:#1a201f;
  --ink-2:#46504d;
  --ink-3:#7d8682;
  --line:#e3ddd0;
  --line-strong:#c9c1ae;
  --accent:#0f4842;        /* deep teal */
  --accent-2:#1d6e66;
  --accent-soft:#dfe9e6;
  --gold:#b5894a;
  --amber-soft:#f1e4cf;
  --rose:#b44a4a;
  --rose-soft:#f2dede;
  --success:#2e6e4a;
  --success-soft:#d9e8df;
  --radius:14px;
  --radius-sm:8px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:"Geist",ui-sans-serif,system-ui,sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;color:inherit}
.serif{font-family:"Fraunces",Georgia,serif;font-weight:400;letter-spacing:-0.01em}
.mono{font-family:"Geist Mono",ui-monospace,monospace}
.app{min-height:100vh;display:grid;grid-template-columns:260px 1fr}

/* ─── SIDEBAR ─────────────────────────────── */
.side{background:var(--surface);border-right:1px solid var(--line);padding:22px 18px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column}
.brand{display:flex;align-items:center;gap:10px;padding:4px 6px 22px}
.brand-mark{width:32px;height:32px;border-radius:8px;background:var(--accent);color:#fff;display:grid;place-items:center;font-family:"Fraunces",serif;font-weight:500;font-size:17px;letter-spacing:-0.02em}
.brand-txt{display:flex;flex-direction:column;line-height:1.15}
.brand-txt b{font-family:"Fraunces",serif;font-weight:500;font-size:15px;letter-spacing:-0.01em}
.brand-txt small{color:var(--ink-3);font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;margin-top:2px}

.nav-label{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-3);padding:14px 10px 6px}
.nav-item{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:9px;color:var(--ink-2);font-size:13.5px;cursor:pointer;transition:background .15s,color .15s;position:relative}
.nav-item:hover{background:#00000008;color:var(--ink)}
.nav-item.active{background:var(--accent);color:#fff}
.nav-item.active .nav-ico{color:#fff;opacity:1}
.nav-ico{width:16px;height:16px;opacity:.75;flex:0 0 16px}
.nav-item .badge{margin-left:auto;background:var(--amber-soft);color:var(--gold);font-size:10.5px;padding:1px 7px;border-radius:999px;font-weight:500;font-family:"Geist Mono",monospace}
.nav-item.active .badge{background:#ffffff22;color:#fff}

.side-foot{margin-top:auto;border-top:1px solid var(--line);padding-top:14px;display:flex;align-items:center;gap:10px}
.avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#c9d6d1,#9ab3ac);display:grid;place-items:center;color:#fff;font-weight:500;font-size:13px;flex:0 0 34px}
.side-foot .meta{line-height:1.2}
.side-foot .meta b{font-size:13px;display:block}
.side-foot .meta small{font-size:11px;color:var(--ink-3)}

/* ─── MAIN ────────────────────────────────── */
.main{min-height:100vh;display:flex;flex-direction:column}
.topbar{padding:18px 40px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--line);background:var(--bg);position:sticky;top:0;z-index:5}
.crumbs{color:var(--ink-3);font-size:12.5px;letter-spacing:0.02em}
.crumbs b{color:var(--ink);font-weight:500}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.icon-btn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;color:var(--ink-2);border:1px solid var(--line);background:var(--card)}
.icon-btn:hover{background:var(--surface)}
.pill{border:1px solid var(--line);background:var(--card);padding:6px 12px;border-radius:999px;font-size:12px;color:var(--ink-2);display:inline-flex;align-items:center;gap:6px}
.dot{width:6px;height:6px;border-radius:50%;background:var(--success)}

.view{padding:36px 40px 80px;max-width:1180px;width:100%}
h1.title{font-family:"Fraunces",serif;font-weight:400;font-size:40px;letter-spacing:-0.02em;margin:0 0 6px;line-height:1.1}
h1.title em{font-style:italic;color:var(--accent)}
.subtitle{color:var(--ink-2);font-size:14.5px;margin:0 0 28px;max-width:64ch}

/* ─── CARDS ────────────────────────────────── */
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
.card.flat{background:var(--surface)}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-family:"Fraunces",serif;font-weight:500;font-size:17px;letter-spacing:-0.01em}
.card-sub{color:var(--ink-3);font-size:12px;letter-spacing:0.04em;text-transform:uppercase}

/* ─── BUTTONS ──────────────────────────────── */
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:10px;font-size:13.5px;font-weight:500;transition:all .15s;border:1px solid transparent}
.btn.primary{background:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-2)}
.btn.ghost{background:transparent;border-color:var(--line-strong);color:var(--ink)}
.btn.ghost:hover{background:var(--card)}
.btn.subtle{background:var(--surface);color:var(--ink-2);border-color:var(--line)}
.btn.subtle:hover{color:var(--ink);background:var(--card)}
.btn.danger{background:transparent;color:var(--rose);border-color:var(--rose-soft)}
.btn.danger:hover{background:var(--rose-soft)}
.btn.sm{padding:6px 11px;font-size:12.5px;border-radius:8px}

/* ─── STATUS CHIPS ─────────────────────────── */
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:500;letter-spacing:0.02em}
.chip .d{width:5px;height:5px;border-radius:50%}
.chip.pending{background:var(--amber-soft);color:#8d6a2b}.chip.pending .d{background:var(--gold)}
.chip.confirmed{background:var(--accent-soft);color:var(--accent)}.chip.confirmed .d{background:var(--accent)}
.chip.completed{background:var(--success-soft);color:var(--success)}.chip.completed .d{background:var(--success)}
.chip.cancelled{background:var(--rose-soft);color:var(--rose)}.chip.cancelled .d{background:var(--rose)}
.chip.paid{background:var(--success-soft);color:var(--success)}.chip.paid .d{background:var(--success)}
.chip.unpaid{background:var(--amber-soft);color:#8d6a2b}.chip.unpaid .d{background:var(--gold)}
.chip.active{background:var(--accent-soft);color:var(--accent)}.chip.active .d{background:var(--accent)}

/* ─── DASHBOARD ─────────────────────────────── */
.dash-hero{display:grid;grid-template-columns:1.4fr 1fr;gap:20px;margin-bottom:22px}
.hero-card{background:linear-gradient(155deg,#0f4842 0%,#1d6e66 100%);color:#fff;border-radius:var(--radius);padding:28px 30px;position:relative;overflow:hidden}
.hero-card::after{content:"";position:absolute;right:-60px;top:-60px;width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,#ffffff22 0%,transparent 70%)}
.hero-eyebrow{font-size:11px;letter-spacing:0.14em;text-transform:uppercase;opacity:.7;margin-bottom:10px}
.hero-date{font-family:"Fraunces",serif;font-weight:300;font-size:52px;letter-spacing:-0.03em;line-height:1;margin-bottom:4px}
.hero-date em{font-style:italic;font-weight:400}
.hero-sub{font-size:14px;opacity:.85;margin-bottom:22px}
.hero-info{display:flex;gap:22px;border-top:1px solid #ffffff22;padding-top:18px}
.hero-info div{flex:1}
.hero-info small{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;opacity:.6;display:block;margin-bottom:4px}
.hero-info b{font-size:14.5px;font-weight:500}

.tasks-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px;display:flex;flex-direction:column}
.task{display:flex;gap:12px;align-items:flex-start;padding:12px 0;border-bottom:1px dashed var(--line)}
.task:last-child{border-bottom:none}
.task-ico{width:32px;height:32px;border-radius:8px;display:grid;place-items:center;flex:0 0 32px}
.task-ico.amber{background:var(--amber-soft);color:var(--gold)}
.task-ico.teal{background:var(--accent-soft);color:var(--accent)}
.task-ico.rose{background:var(--rose-soft);color:var(--rose)}
.task b{font-size:13.5px;font-weight:500;display:block}
.task small{color:var(--ink-3);font-size:12px}
.task .task-cta{margin-left:auto;color:var(--accent);font-size:12.5px;font-weight:500;align-self:center}

.quick-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.quick{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 18px 20px;text-align:left;transition:all .15s;cursor:pointer}
.quick:hover{border-color:var(--line-strong);transform:translateY(-1px)}
.quick .q-ico{width:36px;height:36px;border-radius:10px;background:var(--surface);display:grid;place-items:center;color:var(--accent);margin-bottom:14px}
.quick b{display:block;font-family:"Fraunces",serif;font-weight:500;font-size:16px;margin-bottom:2px}
.quick small{color:var(--ink-3);font-size:12px}

.split{display:grid;grid-template-columns:2fr 1fr;gap:20px}

/* ─── TIMELINE ────────────────────────────── */
.visit-row{display:grid;grid-template-columns:110px 1fr auto;gap:20px;padding:18px 0;border-bottom:1px solid var(--line)}
.visit-row:last-child{border-bottom:none}
.vdate{font-family:"Fraunces",serif}
.vdate .day{font-size:28px;font-weight:400;line-height:1;letter-spacing:-0.02em}
.vdate .mon{font-size:11px;text-transform:uppercase;letter-spacing:0.12em;color:var(--ink-3);margin-top:2px}
.vdate .yr{font-size:11px;color:var(--ink-3);margin-top:1px}
.vbody b{font-size:14px;font-weight:500;display:block;margin-bottom:3px}
.vbody small{color:var(--ink-3);font-size:12.5px;display:block;margin-bottom:6px}
.vbody .diag{color:var(--ink-2);font-size:13px}

/* ─── BOOKING ─────────────────────────────── */
.booking{display:grid;grid-template-columns:1.3fr 1fr;gap:24px}
.cal{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px}
.cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.cal-month{font-family:"Fraunces",serif;font-weight:500;font-size:18px}
.cal-nav{display:flex;gap:6px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.cal-dow{text-align:center;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);padding:8px 0}
.cal-day{aspect-ratio:1;display:grid;place-items:center;font-size:13px;border-radius:8px;cursor:pointer;position:relative;color:var(--ink)}
.cal-day.muted{color:var(--ink-3);opacity:.4}
.cal-day.past{color:var(--ink-3);cursor:not-allowed;opacity:.3}
.cal-day:hover:not(.muted):not(.past){background:var(--surface)}
.cal-day.has-slots::after{content:"";position:absolute;bottom:5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:var(--accent)}
.cal-day.selected{background:var(--accent);color:#fff}
.cal-day.selected::after{background:#fff}
.cal-day.today{font-weight:600}
.cal-day.today::before{content:"";position:absolute;inset:3px;border:1px dashed var(--accent);border-radius:7px}

.slots-head{margin-bottom:16px}
.slots-head b{font-family:"Fraunces",serif;font-weight:500;font-size:18px;display:block}
.slots-head small{color:var(--ink-3);font-size:12.5px}
.slots-group{margin-top:14px}
.slots-label{font-size:10.5px;letter-spacing:0.1em;text-transform:uppercase;color:var(--ink-3);margin-bottom:8px}
.slot-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px}
.slot{padding:10px 0;border:1px solid var(--line);border-radius:8px;font-size:12.5px;text-align:center;cursor:pointer;background:var(--card);font-variant-numeric:tabular-nums;font-family:"Geist Mono",monospace;color:var(--ink-2)}
.slot:hover:not(.taken){border-color:var(--accent);color:var(--accent)}
.slot.selected{background:var(--accent);color:#fff;border-color:var(--accent)}
.slot.taken{background:var(--surface);color:var(--ink-3);text-decoration:line-through;cursor:not-allowed;opacity:.6}

.reason-box{margin-top:14px}
.reason-box label{font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3);display:block;margin-bottom:6px}
.reason-box textarea{width:100%;border:1px solid var(--line);border-radius:10px;padding:11px 12px;font-size:13.5px;background:var(--surface);resize:none;min-height:74px;outline:none;transition:border .15s}
.reason-box textarea:focus{border-color:var(--accent);background:#fff}

.review-card{background:var(--surface);border:1px dashed var(--line-strong);border-radius:var(--radius);padding:18px 20px;margin-top:16px}
.review-row{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-bottom:1px dashed var(--line)}
.review-row:last-child{border-bottom:none}
.review-row span{color:var(--ink-3)}
.review-row b{font-weight:500}

/* ─── APPOINTMENTS LIST ───────────────────── */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{padding:10px 14px;font-size:13px;color:var(--ink-3);border-bottom:2px solid transparent;margin-bottom:-1px;cursor:pointer;transition:all .15s}
.tab:hover{color:var(--ink-2)}
.tab.active{color:var(--accent);border-color:var(--accent);font-weight:500}
.tab .n{margin-left:5px;font-family:"Geist Mono",monospace;font-size:11px;color:var(--ink-3)}
.tab.active .n{color:var(--accent)}

.appt{display:grid;grid-template-columns:auto 1fr auto;gap:20px;padding:18px 22px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;align-items:center}
.appt-time{text-align:center;padding-right:18px;border-right:1px solid var(--line);min-width:90px}
.appt-time .h{font-family:"Geist Mono",monospace;font-size:20px;font-weight:500;letter-spacing:-0.02em}
.appt-time .d{font-size:11px;color:var(--ink-3);margin-top:2px;text-transform:uppercase;letter-spacing:0.06em}
.appt-body b{font-size:14.5px;font-weight:500;font-family:"Fraunces",serif;display:block;margin-bottom:3px}
.appt-body small{color:var(--ink-3);font-size:12.5px}
.appt-actions{display:flex;gap:8px;align-items:center}

/* ─── PRESCRIPTIONS / INVOICES ───────────── */
.list-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:20px;padding:18px 22px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);margin-bottom:10px;align-items:center;transition:all .15s;cursor:pointer}
.list-row:hover{border-color:var(--line-strong)}
.list-ico{width:42px;height:42px;border-radius:10px;display:grid;place-items:center;color:var(--accent);background:var(--accent-soft)}
.list-ico.gold{color:var(--gold);background:var(--amber-soft)}
.list-body b{font-size:14.5px;font-weight:500;display:block;margin-bottom:2px;font-family:"Fraunces",serif}
.list-body small{color:var(--ink-3);font-size:12.5px}
.list-amount{font-family:"Geist Mono",monospace;font-size:15px;font-weight:500;letter-spacing:-0.01em}

/* ─── MODAL / DRAWER ──────────────────────── */
.scrim{position:fixed;inset:0;background:#1a201f88;backdrop-filter:blur(4px);z-index:50;opacity:0;pointer-events:none;transition:opacity .2s}
.scrim.open{opacity:1;pointer-events:auto}
.drawer{position:fixed;top:0;right:0;bottom:0;width:560px;max-width:94vw;background:var(--bg);z-index:51;transform:translateX(100%);transition:transform .3s cubic-bezier(.3,.7,.2,1);display:flex;flex-direction:column;box-shadow:-20px 0 60px #1a201f22}
.drawer.open{transform:translateX(0)}
.drawer-head{padding:22px 28px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:var(--surface)}
.drawer-head h2{font-family:"Fraunces",serif;font-weight:400;font-size:22px;margin:0;letter-spacing:-0.01em}
.drawer-head .close{margin-left:auto;width:32px;height:32px;border-radius:8px;display:grid;place-items:center;color:var(--ink-2);border:1px solid var(--line);background:var(--card)}
.drawer-body{padding:24px 28px;overflow:auto;flex:1}
.detail-row{display:grid;grid-template-columns:140px 1fr;gap:16px;padding:10px 0;border-bottom:1px dashed var(--line);align-items:baseline}
.detail-row:last-child{border-bottom:none}
.detail-row label{font-size:11.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--ink-3)}
.detail-row .val{font-size:13.5px;color:var(--ink)}
.section-head{font-family:"Fraunces",serif;font-weight:500;font-size:15px;color:var(--accent);margin:22px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--line)}

.med-row{display:grid;grid-template-columns:auto 1fr;gap:14px;padding:14px 0;border-bottom:1px dashed var(--line)}
.med-row:last-child{border-bottom:none}
.med-pill{width:38px;height:38px;border-radius:10px;background:var(--surface);display:grid;place-items:center;color:var(--accent);border:1px solid var(--line)}
.med-row b{font-size:14px;font-weight:500;display:block}
.med-row small{color:var(--ink-3);font-size:12.5px;display:block;margin-bottom:4px}
.med-row .freq{font-family:"Geist Mono",monospace;font-size:12px;color:var(--ink-2);background:var(--amber-soft);display:inline-block;padding:2px 8px;border-radius:4px;margin-top:3px}

.invoice-lines{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-top:12px}
.inv-line{display:flex;justify-content:space-between;font-size:13.5px;padding:8px 0;border-bottom:1px dashed var(--line)}
.inv-line:last-child{border-bottom:none;padding-top:14px;font-weight:500;border-top:1px solid var(--line-strong);margin-top:6px}
.inv-line .amt{font-family:"Geist Mono",monospace;font-variant-numeric:tabular-nums}

/* ─── TOAST ────────────────────────────────── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;display:flex;align-items:center;gap:10px;z-index:100;opacity:0;transition:all .25s;pointer-events:none;box-shadow:0 12px 40px #1a201f33}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast .ok{width:18px;height:18px;border-radius:50%;background:var(--success);color:#fff;display:grid;place-items:center;font-size:11px}

/* ─── TWEAKS ──────────────────────────────── */
.tweaks{position:fixed;bottom:20px;right:20px;width:280px;background:var(--card);border:1px solid var(--line-strong);border-radius:14px;padding:16px;box-shadow:0 20px 60px #1a201f22;z-index:40;display:none;font-size:12.5px}
.tweaks.open{display:block}
.tweaks h4{margin:0 0 10px;font-family:"Fraunces",serif;font-weight:500;font-size:14px}
.tw-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px dashed var(--line)}
.tw-row:last-child{border-bottom:none}
.tw-row label{font-size:12px;color:var(--ink-2)}
.tw-swatch{display:flex;gap:6px}
.tw-swatch div{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border .1s}
.tw-swatch div.sel{border-color:var(--ink)}
.tw-select{border:1px solid var(--line);border-radius:6px;padding:4px 8px;font-size:12px;background:var(--card)}

/* responsive-ish */
@media(max-width:980px){
  .app{grid-template-columns:1fr}
  .side{display:none}
  .dash-hero,.booking,.split,.quick-grid{grid-template-columns:1fr}
  .view{padding:22px}
  .topbar{padding:14px 22px}
}
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

const VISITS = [
  { id:"V-0039", apptId:"RDV-0039", dateISO:"2026-04-09", diag:"Accumulation modérée de tartre supra-gingival, gencives légèrement enflammées sur les quadrants inférieurs.",

    ops:[{name:"Remplissage composite", cost:300},{name:"Radiographie rétro-alvéolaire", cost:60}], base:200, hasRx:true, rxId:"RX-0036", invId:"FA-2026-036" },

  { id:"FA-2026-039", visitId:"V-0039", date:"2026-04-09", base:200, opsTotal:230, total:430, status:"paid", paidDate:"2026-04-09", ops:[{n:"Détartrage",c:150},{n:"Polissage",c:80}] },
  { id:"FA-2026-036", visitId:"V-0036", date:"2026-03-02", base:200, opsTotal:360, total:560, status:"paid", paidDate:"2026-03-02", ops:[{n:"Remplissage composite",c:300},{n:"Radio. rétro-alvéolaire",c:60}] },
  { id:"FA-2026-034", visitId:"V-0034", date:"2026-02-10", base:100, opsTotal:120, total:220, status:"unpaid", paidDate:null, ops:[{n:"Consultation",c:0},{n:"Radio. panoramique",c:120}] },
];

/* ───── Helpers ───── */
const MONTHS_FR = ["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const MONTHS_SHORT = ["janv","févr","mars","avr","mai","juin","juil","août","sept","oct","nov","déc"];
const DOW_SHORT = ["lun","mar","mer","jeu","ven","sam","dim"];

const fmtDate = (iso) => {
  const d = new Date(iso);
  return `${d.getDate()} ${MONTHS_FR[d.getMonth()]} ${d.getFullYear()}`;
};
const fmtShortDate = (iso) => {
  const d = new Date(iso);
  return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()}`;
};
const fmtTime = (iso) => {
  const d = new Date(iso);
  return `${String(d.getHours()).padStart(2,'0')}h${String(d.getMinutes()).padStart(2,'0')}`;
};
const fmtDow = (iso) => {
  const d = new Date(iso);
  return DOW_SHORT[(d.getDay()+6)%7];
};

const STATUS_LABEL = {
  pending:"En attente", confirmed:"Confirmé", completed:"Complété", cancelled:"Annulé",
  paid:"Payée", unpaid:"À régler", active:"Actif",
};

/* ───── APP ───── */
function App(){
  const [tweaks, setTweaks] = useState(TWEAKS_DEFAULTS);
  const [route, setRoute] = useState("dashboard");
  const [appts, setAppts] = useState(APPTS);
  const [drawer, setDrawer] = useState(null); // {type, id}
  const [toast, setToast] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [editMode, setEditMode] = useState(false);

  // Apply accent dynamically
  useEffect(()=>{
    const palettes = {
      teal:   { a:"#0f4842", a2:"#1d6e66", soft:"#dfe9e6" },
      indigo: { a:"#3a3a8a", a2:"#5757b0", soft:"#e0e0ef" },
      rust:   { a:"#8c3a1f", a2:"#b15839", soft:"#f0dbd0" },
      forest: { a:"#2f5233", a2:"#4a7752", soft:"#dde7de" },
    };
    const p = palettes[tweaks.accent] || palettes.teal;
    const r = document.documentElement.style;
    r.setProperty("--accent", p.a);
    r.setProperty("--accent-2", p.a2);
    r.setProperty("--accent-soft", p.soft);
  }, [tweaks.accent]);

  // Tweaks protocol
  useEffect(()=>{
    const handler = (e)=>{
      if(e?.data?.type==="__activate_edit_mode"){ setEditMode(true); setTweaksOpen(true); }
      if(e?.data?.type==="__deactivate_edit_mode"){ setEditMode(false); setTweaksOpen(false); }
    };
    window.addEventListener("message", handler);
    window.parent?.postMessage({type:"__edit_mode_available"}, "*");
    return ()=>window.removeEventListener("message", handler);
  }, []);

  const updateTweak = (k,v) => {
    setTweaks(prev=>{
      const next = {...prev, [k]:v};
      window.parent?.postMessage({type:"__edit_mode_set_keys", edits:{[k]:v}}, "*");
      return next;
    });
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(()=>setToast(null), 2600);
  };

  const upcoming = appts.filter(a=>a.status==="confirmed"||a.status==="pending")
    .sort((a,b)=>new Date(a.dateISO)-new Date(b.dateISO));
  const nextAppt = upcoming.find(a=>a.status==="confirmed") || upcoming[0];

  const cancelAppt = (id) => {
    setAppts(prev => prev.map(a => a.id===id ? {...a, status:"cancelled"} : a));
    showToast("Rendez-vous annulé");
    setDrawer(null);
  };

  const bookAppt = ({ dateISO, reason }) => {
    const newId = "RDV-0" + Math.floor(Math.random()*900+100);
    setAppts(prev => [
      { id:newId, dateISO, duration:30, dentist:DENTIST, reason: reason||"—", status:"pending" },
      ...prev
    ]);
    showToast("Réservation enregistrée · en attente de confirmation");
    setRoute("appointments");
  };

  return (
    <div className="app">
      <Sidebar route={route} setRoute={setRoute} name={tweaks.firstName} upcomingCount={upcoming.length}/>
      <div className="main">
        <Topbar route={route} onOpenTweaks={()=>setTweaksOpen(o=>!o)} name={tweaks.firstName}/>
        <div className="view">
          {route==="dashboard"   && <Dashboard appts={appts} visits={VISITS} rx={RX} invs={INVS} setRoute={setRoute} setDrawer={setDrawer} name={tweaks.firstName} nextAppt={nextAppt}/>}
          {route==="book"        && <Booking appts={appts} onBook={bookAppt} onCancel={()=>setRoute("dashboard")}/>}
          {route==="appointments"&& <Appointments appts={appts} onCancel={cancelAppt} setDrawer={setDrawer} setRoute={setRoute}/>}
          {route==="visits"      && <VisitsList visits={VISITS} setDrawer={setDrawer}/>}
          {route==="rx"          && <RxList rx={RX} setDrawer={setDrawer} showToast={showToast}/>}
          {route==="invoices"    && <InvList invs={INVS} setDrawer={setDrawer} showToast={showToast}/>}
          {route==="profile"     && <Profile name={tweaks.firstName} showToast={showToast}/>}
        </div>
      </div>

      <Drawer drawer={drawer} setDrawer={setDrawer} appts={appts} visits={VISITS} rx={RX} invs={INVS} cancelAppt={cancelAppt} showToast={showToast}/>

      <Toast toast={toast}/>
      <Tweaks open={tweaksOpen} editMode={editMode} tweaks={tweaks} update={updateTweak} onClose={()=>setTweaksOpen(false)}/>
    </div>
  );
}

/* ───── Sidebar ───── */
function Sidebar({ route, setRoute, name, upcomingCount }){
  const items = [
    { id:"dashboard",    label:"Tableau de bord", ico:I.home },
    { id:"book",         label:"Réserver",        ico:I.sparkle },
    { id:"appointments", label:"Mes rendez-vous", ico:I.cal, badge: upcomingCount || null },
    { id:"visits",       label:"Mes visites",     ico:I.list },
    { id:"rx",           label:"Ordonnances",     ico:I.pill },
    { id:"invoices",     label:"Factures",        ico:I.receipt },
  ];
  return (
    <aside className="side">
      <div className="brand">
        <div className="brand-mark">A</div>
        <div className="brand-txt">
          <b>Al-Akwa</b>
          <small>Clinique Dentaire</small>
        </div>
      </div>

      <div className="nav-label">Espace patient</div>
      {items.map(it=>(
        <div key={it.id} className={"nav-item"+(route===it.id?" active":"")} onClick={()=>setRoute(it.id)}>
          <span className="nav-ico">{it.ico}</span>
          <span>{it.label}</span>
          {it.badge ? <span className="badge">{it.badge}</span> : null}
        </div>
      ))}

      <div className="nav-label">Compte</div>
      <div className={"nav-item"+(route==="profile"?" active":"")} onClick={()=>setRoute("profile")}>
        <span className="nav-ico">{I.user}</span><span>Mon profil</span>
      </div>

      <div className="side-foot">
        <div className="avatar">{(name||"Y").charAt(0)}</div>
        <div className="meta">
          <b>{name} El Mansouri</b>
          <small>Patient · Actif</small>
        </div>
      </div>
    </aside>
  );
}

/* ───── Topbar ───── */
function Topbar({ route, onOpenTweaks, name }){
  const labels = {
    dashboard:"Tableau de bord", book:"Réserver un rendez-vous",
    appointments:"Mes rendez-vous", visits:"Mes visites",
    rx:"Mes ordonnances", invoices:"Mes factures", profile:"Mon profil",
  };
  return (
    <div className="topbar">
      <div className="crumbs">Portail patient · <b>{labels[route]}</b></div>
      <div className="top-right">
        <span className="pill"><span className="dot"></span>Compte actif</span>
        <button className="icon-btn" onClick={onOpenTweaks} title="Réglages">{I.gear}</button>
        <button className="icon-btn" title="Notifications">{I.bell}</button>
      </div>
    </div>
  );
}

/* ───── Dashboard ───── */
function Dashboard({ appts, visits, rx, invs, setRoute, setDrawer, name, nextAppt }){
  const pendingInvoices = invs.filter(i=>i.status==="unpaid");
  const activeRx = rx.filter(r=>r.status==="active");
  const pendingAppts = appts.filter(a=>a.status==="pending");

  const greeting = (() => {
    const h = new Date().getHours();
    if(h<12) return "Bonjour";
    if(h<18) return "Bon après-midi";
    return "Bonsoir";
  })();

  return (
    <div>
      <h1 className="title">{greeting}, <em>{name}</em>.</h1>
      <p className="subtitle">Voici un aperçu de votre suivi bucco-dentaire à la Clinique Al-Akwa. Tout ce dont vous avez besoin — rendez-vous, ordonnances, factures — en un seul endroit.</p>

      {/* Hero + tasks */}
      <div className="dash-hero">
        <div className="hero-card">
          <div className="hero-eyebrow">Prochain rendez-vous</div>
          {nextAppt ? (
            <>
              <div className="hero-date">
                {new Date(nextAppt.dateISO).getDate()} <em>{MONTHS_FR[new Date(nextAppt.dateISO).getMonth()]}</em>
              </div>
              <div className="hero-sub">
                {fmtDow(nextAppt.dateISO)}. à {fmtTime(nextAppt.dateISO)} · avec {nextAppt.dentist} · {nextAppt.duration} min
              </div>
              <div className="hero-info">
                <div>
                  <small>Motif</small>
                  <b>{nextAppt.reason}</b>
                </div>
                <div>
                  <small>Statut</small>
                  <b>{nextAppt.status==="confirmed"?"Confirmé":"En attente de confirmation"}</b>
                </div>
                <div>
                  <small>Référence</small>
                  <b style={{fontFamily:'"Geist Mono",monospace'}}>{nextAppt.id}</b>
                </div>
              </div>
            </>
          ) : (
            <div style={{padding:"28px 0"}}>
              <div className="hero-sub" style={{opacity:.9}}>Aucun rendez-vous à venir.</div>
              <button className="btn" style={{background:"#ffffff22",color:"#fff",marginTop:12}} onClick={()=>setRoute("book")}>
                {I.plus} Réserver
              </button>
            </div>
          )}
        </div>

        <div className="tasks-card">
          <div className="card-head">
            <div className="card-title">Actions en attente</div>
            <span className="card-sub">{pendingInvoices.length + activeRx.length + pendingAppts.length}</span>
          </div>
          {pendingInvoices.map(inv=>(
            <div key={inv.id} className="task">
              <div className="task-ico amber">{I.receipt}</div>
              <div>
                <b>Facture {inv.id} à régler</b>
                <small>{inv.total} MAD · visite du {fmtShortDate(inv.date)}</small>
              </div>
              <span className="task-cta" onClick={()=>setDrawer({type:"invoice", id:inv.id})}>Voir →</span>
            </div>
          ))}
          {activeRx.map(r=>(
            <div key={r.id} className="task">
              <div className="task-ico teal">{I.pill}</div>
              <div>
                <b>Ordonnance active</b>
                <small>{r.meds.length} médicaments · délivrée le {fmtShortDate(r.date)}</small>
              </div>
              <span className="task-cta" onClick={()=>setDrawer({type:"rx", id:r.id})}>Voir →</span>
            </div>
          ))}
          {pendingAppts.map(a=>(
            <div key={a.id} className="task">
              <div className="task-ico rose">{I.clock}</div>
              <div>
                <b>En attente de confirmation</b>
                <small>{fmtShortDate(a.dateISO)} à {fmtTime(a.dateISO)}</small>
              </div>
              <span className="task-cta" onClick={()=>setDrawer({type:"appt", id:a.id})}>Voir →</span>
            </div>
          ))}
          {pendingInvoices.length + activeRx.length + pendingAppts.length === 0 && (
            <div style={{color:"var(--ink-3)",fontSize:13,padding:"18px 0"}}>Tout est en ordre. ✦</div>
          )}
        </div>
      </div>

      {/* Quick actions */}
      <div className="quick-grid">
        <div className="quick" onClick={()=>setRoute("book")}>
          <div className="q-ico">{I.sparkle}</div>
          <b>Réserver</b>
          <small>Nouveau rendez-vous</small>
        </div>
        <div className="quick" onClick={()=>setRoute("visits")}>
          <div className="q-ico">{I.tooth}</div>
          <b>Mes visites</b>
          <small>Historique & diagnostics</small>
        </div>
        <div className="quick" onClick={()=>setRoute("rx")}>
          <div className="q-ico">{I.pill}</div>
          <b>Ordonnances</b>
          <small>Télécharger en PDF</small>
        </div>

/* ───── Booking ───── */
function Booking({ appts, onBook, onCancel }){
  const today = new Date(); today.setHours(0,0,0,0);
  const [viewYear, setViewYear] = useState(today.getFullYear());
  const [viewMonth, setViewMonth] = useState(today.getMonth());
  const [selectedDate, setSelectedDate] = useState(null);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [reason, setReason] = useState("");

  // Build calendar grid
  const firstOfMonth = new Date(viewYear, viewMonth, 1);
  const lastOfMonth = new Date(viewYear, viewMonth+1, 0);
  const startDow = (firstOfMonth.getDay()+6)%7; // mon=0
  const daysInMonth = lastOfMonth.getDate();
  const prevMonthLast = new Date(viewYear, viewMonth, 0).getDate();

  const cells = [];
  for(let i=0;i<startDow;i++) cells.push({ day: prevMonthLast-startDow+1+i, muted:true });
  for(let d=1; d<=daysInMonth; d++) cells.push({ day:d });
  while(cells.length < 42) cells.push({ day: cells.length-startDow-daysInMonth+1, muted:true });

  const morningSlots = ["09:00","09:30","10:00","10:30","11:00","11:30"];
  const afternoonSlots = ["14:00","14:30","15:00","15:30","16:00","16:30","17:00","17:30"];

  // Deterministic "taken" slots based on date
  const takenFor = (d) => {
    if(!d) return [];
    const seed = (d.getDate()*7 + d.getMonth()*13) % 20;
    const all = [...morningSlots, ...afternoonSlots];
    const taken = [];
    for(let i=0;i<3;i++){ taken.push(all[(seed+i*5)%all.length]); }
    return taken;
  };
  const taken = takenFor(selectedDate);

  const hasSlots = (y,m,d) => {
    const date = new Date(y,m,d); date.setHours(0,0,0,0);
    if(date < today) return false;
    const dow = date.getDay();
    if(dow===0) return false; // dimanche fermé
    return true;
  };

  const confirmBook = () => {
    if(!selectedDate || !selectedSlot) return;
    const [h,mi] = selectedSlot.split(":");
    const dt = new Date(selectedDate); dt.setHours(Number(h), Number(mi), 0, 0);
    // Build ISO WITHOUT timezone shift
    const pad = (n)=>String(n).padStart(2,'0');
    const iso = `${dt.getFullYear()}-${pad(dt.getMonth()+1)}-${pad(dt.getDate())}T${pad(dt.getHours())}:${pad(dt.getMinutes())}`;
    onBook({ dateISO: iso, reason });
  };

  return (
    <div>
      <h1 className="title">Réserver un <em>rendez-vous</em></h1>
      <p className="subtitle">Choisissez une date et un créneau horaire. Votre demande sera transmise à la secrétaire pour confirmation. Vous recevrez un email dès qu'elle sera validée.</p>

      <div className="booking">
        <div>
          <div className="cal">
            <div className="cal-head">
              <div className="cal-month">{MONTHS_FR[viewMonth].charAt(0).toUpperCase()+MONTHS_FR[viewMonth].slice(1)} {viewYear}</div>
              <div className="cal-nav">
                <button className="icon-btn" onClick={()=>{
                  if(viewMonth===0){ setViewMonth(11); setViewYear(viewYear-1); }
                  else setViewMonth(viewMonth-1);
                }}>{I.chevronL}</button>
                <button className="icon-btn" onClick={()=>{
                  if(viewMonth===11){ setViewMonth(0); setViewYear(viewYear+1); }
                  else setViewMonth(viewMonth+1);
                }}>{I.chevronR}</button>
              </div>
            </div>
            <div className="cal-grid">
              {DOW_SHORT.map(d=> <div key={d} className="cal-dow">{d}</div>)}
              {cells.map((c,i)=>{
                if(c.muted) return <div key={i} className="cal-day muted">{c.day}</div>;
                const date = new Date(viewYear, viewMonth, c.day);
                const isPast = date < today;
                const isSunday = date.getDay()===0;
                const avail = hasSlots(viewYear, viewMonth, c.day);
                const isToday = date.getTime()===today.getTime();
                const isSel = selectedDate && selectedDate.getTime()===date.getTime();
                const cls = ["cal-day"];
                if(isPast||isSunday) cls.push("past");
                if(avail) cls.push("has-slots");
                if(isToday) cls.push("today");
                if(isSel) cls.push("selected");
                return (
                  <div key={i} className={cls.join(" ")} onClick={()=>{
                    if(isPast||isSunday) return;
                    setSelectedDate(date);
                    setSelectedSlot(null);
                  }}>{c.day}</div>
                );
              })}
            </div>
            <div style={{marginTop:14,display:"flex",alignItems:"center",gap:14,fontSize:11.5,color:"var(--ink-3)"}}>
              <span style={{display:"inline-flex",alignItems:"center",gap:6}}><span style={{width:4,height:4,borderRadius:2,background:"var(--accent)"}}/>Créneaux disponibles</span>
              <span>· Dimanche fermé</span>
            </div>
          </div>

          {selectedDate && selectedSlot && (
            <div className="review-card">
              <div style={{fontFamily:'"Fraunces",serif',fontSize:15,fontWeight:500,marginBottom:10}}>Récapitulatif</div>
              <div className="review-row"><span>Date</span><b>{fmtDate(selectedDate.toISOString())}</b></div>
              <div className="review-row"><span>Heure</span><b>{selectedSlot}</b></div>
              <div className="review-row"><span>Dentiste</span><b>{DENTIST}</b></div>
              <div className="review-row"><span>Durée estimée</span><b>30 min</b></div>
              <div style={{display:"flex",gap:10,marginTop:16}}>
                <button className="btn primary" onClick={confirmBook}>{I.check} Confirmer la réservation</button>
                <button className="btn ghost" onClick={()=>{setSelectedDate(null);setSelectedSlot(null);}}>Réinitialiser</button>
              </div>
            </div>
          )}
        </div>

        <div className="card">
          <div className="slots-head">
            <b>{selectedDate ? fmtDate(selectedDate.toISOString()) : "Sélectionnez une date"}</b>
            <small>{selectedDate ? "Choisissez un créneau disponible" : "Les créneaux apparaîtront ici"}</small>
          </div>

          {selectedDate && (
            <>
              <div className="slots-group">
                <div className="slots-label">Matin</div>
                <div className="slot-grid">
                  {morningSlots.map(s=>(
                    <div key={s} className={"slot"+(taken.includes(s)?" taken":"")+(selectedSlot===s?" selected":"")}
                         onClick={()=>!taken.includes(s) && setSelectedSlot(s)}>{s}</div>
                  ))}
                </div>
                <div className="slots-label">Après-midi</div>
                <div className="slot-grid">
                  {afternoonSlots.map(s=>(
                    <div key={s} className={"slot"+(taken.includes(s)?" taken":"")+(selectedSlot===s?" selected":"")}
                         onClick={()=>!taken.includes(s) && setSelectedSlot(s)}>{s}</div>
                  ))}
                </div>
              </div>

              <div className="reason-box">
                <label>Motif de la visite (optionnel)</label>
                <textarea placeholder="Ex. douleur sur la molaire inférieure droite, contrôle annuel…"
                          value={reason} onChange={e=>setReason(e.target.value)} />
              </div>
            </>
          )}

          {!selectedDate && (
            <div style={{color:"var(--ink-3)",fontSize:13,padding:"40px 0",textAlign:"center",borderTop:"1px dashed var(--line)",marginTop:8}}>
              ✦<br/>
              <div style={{marginTop:8}}>Sélectionnez un jour dans le calendrier pour voir les créneaux.</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

  let title = "Détails", body = null;

  if(drawer?.type==="appt"){
    const a = appts.find(x=>x.id===drawer.id);
    if(a){
      title = "Rendez-vous " + a.id;
      body = (
        <>
          <div style={{marginBottom:18}}>
            <span className={"chip "+a.status}><span className="d"></span>{STATUS_LABEL[a.status]}</span>
          </div>
          <div className="detail-row"><label>Date</label><div className="val">{fmtDate(a.dateISO)}</div></div>
          <div className="detail-row"><label>Heure</label><div className="val mono">{fmtTime(a.dateISO)} · {a.duration} min</div></div>
          <div className="detail-row"><label>Dentiste</label><div className="val">{a.dentist}</div></div>
          <div className="detail-row"><label>Motif</label><div className="val">{a.reason}</div></div>
          <div className="detail-row"><label>Référence</label><div className="val mono">{a.id}</div></div>

          {a.status==="pending" && (
            <div className="card flat" style={{marginTop:20,background:"var(--amber-soft)",border:"none"}}>
              <div style={{fontSize:13,color:"#8d6a2b"}}>
                ✦ Votre demande est en attente de confirmation par la secrétaire. Vous recevrez un email dès qu'elle sera validée.
              </div>
            </div>
          )}

          {a.status==="pending" && (
            <div style={{display:"flex",gap:10,marginTop:20}}>
              <button className="btn danger" onClick={()=>cancelAppt(a.id)}>Annuler ce rendez-vous</button>
            </div>
          )}
        </>
      );
    }
  }

  if(drawer?.type==="visit"){
    const v = visits.find(x=>x.id===drawer.id);
    if(v){
      title = "Visite du " + fmtDate(v.dateISO);
      const r = v.hasRx ? rx.find(x=>x.id===v.rxId) : null;
      const inv = invs.find(x=>x.id===v.invId);
      body = (
        <>
          <span className="chip completed"><span className="d"></span>Complétée</span>
          <div style={{marginTop:18}}>
            <div className="detail-row"><label>Dentiste</label><div className="val">{DENTIST}</div></div>
            <div className="detail-row"><label>Référence</label><div className="val mono">{v.id}</div></div>
          </div>

          <div className="section-head">Diagnostic</div>
          <div style={{fontSize:13.5,color:"var(--ink-2)",lineHeight:1.65}}>{v.diag}</div>

          <div className="section-head">Traitement fourni</div>
          <div style={{fontSize:13.5,color:"var(--ink-2)",lineHeight:1.65}}>{v.treatment}</div>

          <div className="section-head">Opérations effectuées</div>
          {v.ops.map((o,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:"1px dashed var(--line)",fontSize:13.5}}>
              <span>{o.name}</span>
              <b className="mono" style={{fontWeight:500}}>{o.cost} MAD</b>
            </div>
          ))}

          <div style={{display:"flex",gap:10,marginTop:22,flexWrap:"wrap"}}>
            {r && <button className="btn primary" onClick={()=>setDrawer({type:"rx",id:r.id})}>{I.pill} Voir l'ordonnance</button>}
            {inv && <button className="btn ghost" onClick={()=>setDrawer({type:"invoice",id:inv.id})}>{I.receipt} Voir la facture</button>}
          </div>
        </>
      );
    }
  }

  if(drawer?.type==="rx"){
    const r = rx.find(x=>x.id===drawer.id);
    if(r){
      title = "Ordonnance " + r.id;
      body = (
        <>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
            <span className={"chip "+r.status}><span className="d"></span>{STATUS_LABEL[r.status]}</span>
            <span style={{color:"var(--ink-3)",fontSize:12.5}}>Délivrée le {fmtDate(r.date)}</span>
          </div>

          <div className="detail-row"><label>Dentiste</label><div className="val">{DENTIST}</div></div>
          <div className="detail-row"><label>Référence</label><div className="val mono">{r.id}</div></div>

          <div className="section-head">Médicaments prescrits</div>
          {r.meds.map((m,i)=>(
            <div key={i} className="med-row">
              <div className="med-pill">{I.pill}</div>
              <div>
                <b>{m.name}</b>
                <small>{m.desc}</small>
                <span className="freq">{m.freq} · {m.days} jours</span>
                <div style={{fontSize:12.5,color:"var(--ink-2)",marginTop:6}}>{m.note}</div>
              </div>
            </div>
          ))}

          <div className="section-head">Instructions générales</div>
          <div style={{fontSize:13.5,color:"var(--ink-2)",lineHeight:1.65,background:"var(--surface)",padding:"14px 16px",borderRadius:10,border:"1px dashed var(--line)"}}>
            {r.generalNotes}
          </div>

          <div style={{display:"flex",gap:10,marginTop:22}}>
            <button className="btn primary" onClick={()=>showToast("Téléchargement PDF…")}>{I.download} Télécharger en PDF</button>
            <button className="btn ghost" onClick={()=>showToast("Préparation de l'impression…")}>Imprimer</button>
          </div>
        </>
      );
    }
  }

  if(drawer?.type==="invoice"){
    const inv = invs.find(x=>x.id===drawer.id);
    if(inv){
      title = "Facture " + inv.id;
      body = (
        <>
          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:18}}>
            <span className={"chip "+inv.status}><span className="d"></span>{STATUS_LABEL[inv.status]}</span>
            {inv.paidDate && <span style={{color:"var(--ink-3)",fontSize:12.5}}>Payée le {fmtDate(inv.paidDate)}</span>}
          </div>

          <div className="detail-row"><label>Patient</label><div className="val">Yasmine El Mansouri</div></div>
          <div className="detail-row"><label>Dentiste</label><div className="val">{DENTIST}</div></div>
          <div className="detail-row"><label>Date de visite</label><div className="val">{fmtDate(inv.date)}</div></div>
          <div className="detail-row"><label>Référence</label><div className="val mono">{inv.id}</div></div>

          <div className="section-head">Détails de la facturation</div>
          <div className="invoice-lines">
            <div className="inv-line"><span>Frais de visite de base</span><span className="amt">{inv.base} MAD</span></div>
            {inv.ops.map((o,i)=>(
              <div key={i} className="inv-line"><span>◦ {o.n}</span><span className="amt">{o.c} MAD</span></div>
            ))}
            <div className="inv-line"><span>Total</span><span className="amt">{inv.total} MAD</span></div>
          </div>

          {inv.status==="unpaid" && (
            <div className="card flat" style={{marginTop:20,background:"var(--amber-soft)",border:"none"}}>
              <div style={{fontSize:13,color:"#8d6a2b"}}>
                ✦ Règlement en espèces à la clinique. La secrétaire marquera la facture comme payée à la réception du paiement.
              </div>
            </div>
          )}

          <div style={{display:"flex",gap:10,marginTop:22}}>
            <button className="btn primary" onClick={()=>showToast("Téléchargement PDF…")}>{I.download} Télécharger en PDF</button>
            <button className="btn ghost" onClick={()=>showToast("Préparation de l'impression…")}>Imprimer</button>
          </div>
        </>
      );
    }
  }

  return (
    <>
      <div className={"scrim"+(open?" open":"")} onClick={close}/>
      <div className={"drawer"+(open?" open":"")}>
        <div className="drawer-head">
          <h2>{title}</h2>
          <button className="close" onClick={close}>{I.close}</button>
        </div>
        <div className="drawer-body">
          {body || <div style={{color:"var(--ink-3)"}}>—</div>}
        </div>
      </div>
    </>
  );
}

/* ───── Toast ───── */
function Toast({ toast }){
  return (
    <div className={"toast"+(toast?" show":"")}>
      <span className="ok">{I.check}</span>
      <span>{toast}</span>
    </div>
  );
}

/* ───── Tweaks panel ───── */
function Tweaks({ open, editMode, tweaks, update, onClose }){
  if(!editMode) return null;
  const palettes = [
    { id:"teal",   hex:"#0f4842" },
    { id:"indigo", hex:"#3a3a8a" },
    { id:"rust",   hex:"#8c3a1f" },
    { id:"forest", hex:"#2f5233" },
  ];
  return (
    <div className={"tweaks"+(open?" open":"")}>
      <div style={{display:"flex",alignItems:"center",marginBottom:10}}>
        <h4 style={{flex:1}}>Tweaks</h4>
        <button className="icon-btn" style={{width:26,height:26}} onClick={onClose}>{I.close}</button>
      </div>
      <div className="tw-row">
        <label>Couleur d'accent</label>
        <div className="tw-swatch">
          {palettes.map(p=>(
            <div key={p.id} onClick={()=>update("accent", p.id)}
                 className={tweaks.accent===p.id?"sel":""}
                 style={{background:p.hex}} title={p.id}/>
          ))}
        </div>
      </div>
      <div className="tw-row">
        <label>Prénom du patient</label>
        <input className="tw-select" style={{width:110}}
               value={tweaks.firstName}
               onChange={e=>update("firstName", e.target.value)}/>
      </div>
      <div style={{fontSize:11,color:"var(--ink-3)",marginTop:10,lineHeight:1.5}}>
        Essayez de changer de couleur d'accent ou le prénom — les modifications persistent.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
